# =============================================================================
# eCommsZone — docker-compose.yml
# Centralized communications service bureau for OmniQuest Media Inc.
# Stack: listmonk (orchestration) + PostgreSQL (storage). Delivery is
# performed by Brevo via SMTP / API and is configured at the application
# layer (config/listmonk.toml, .env).
# =============================================================================

name: ecommszone

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — backing store for listmonk (subscribers, campaigns, logs)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: ecommszone-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-listmonk}
      POSTGRES_USER: ${POSTGRES_USER:-listmonk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - ecommszone
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-listmonk} -d ${POSTGRES_DB:-listmonk}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    # Postgres should never be exposed to the host network in production.
    # Uncomment only for local debugging.
    # ports:
    #   - "5432:5432"

  # ---------------------------------------------------------------------------
  # listmonk — orchestration layer for email + SMS campaigns / transactional
  # ---------------------------------------------------------------------------
  listmonk:
    image: listmonk/listmonk:v3.0.0
    container_name: ecommszone-listmonk
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${LISTMONK_PORT:-9000}:9000"
    environment:
      # listmonk reads its DB connection from these env vars (overrides config).
      LISTMONK_db__host: db
      LISTMONK_db__port: "5432"
      LISTMONK_db__user: ${POSTGRES_USER:-listmonk}
      LISTMONK_db__password: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      LISTMONK_db__database: ${POSTGRES_DB:-listmonk}
      LISTMONK_db__ssl_mode: disable
      # Admin bootstrap — set in .env, never commit.
      LISTMONK_ADMIN_USER: ${LISTMONK_ADMIN_USER:?LISTMONK_ADMIN_USER is required}
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_ADMIN_PASSWORD:?LISTMONK_ADMIN_PASSWORD is required}
      # Brevo SMTP credentials — used by listmonk to dispatch mail.
      BREVO_SMTP_HOST: ${BREVO_SMTP_HOST:-smtp-relay.brevo.com}
      BREVO_SMTP_PORT: ${BREVO_SMTP_PORT:-587}
      BREVO_SMTP_USER: ${BREVO_SMTP_USER}
      BREVO_SMTP_PASSWORD: ${BREVO_SMTP_PASSWORD}
      BREVO_API_KEY: ${BREVO_API_KEY}
    volumes:
      - ./config/listmonk.toml:/listmonk/config.toml:ro
      - ./templates:/listmonk/static/templates:ro
      - listmonk-uploads:/listmonk/uploads
    networks:
      - ecommszone
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db-data:
    name: ecommszone_db-data
  listmonk-uploads:
    name: ecommszone_listmonk-uploads

networks:
  ecommszone:
    name: ecommszone
    driver: bridge
# eCommsZone — Docker Compose (Production)
# OmniQuest Media Inc. | PROGRAM_CONTROL: MKTP-WORK-004
# =============================================================================
# Usage:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d
# =============================================================================

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # listmonk — self-hosted newsletter & transactional email manager
  # ---------------------------------------------------------------------------
  listmonk:
    image: listmonk/listmonk:v4.1.0
    container_name: ecommszone_listmonk
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"   # Bind to localhost only; expose via reverse proxy
    environment:
      LISTMONK_app__address: "0.0.0.0:9000"
      LISTMONK_app__admin_username: "${LISTMONK_ADMIN_USER}"
      LISTMONK_app__admin_password: "${LISTMONK_ADMIN_PASSWORD}"
      LISTMONK_db__host: "db"
      LISTMONK_db__port: "5432"
      LISTMONK_db__user: "${POSTGRES_USER}"
      LISTMONK_db__password: "${POSTGRES_PASSWORD}"
      LISTMONK_db__database: "${POSTGRES_DB}"
      LISTMONK_db__ssl_mode: "disable"
    volumes:
      - listmonk_uploads:/listmonk/uploads
      - ./config/listmonk.toml:/listmonk/config.toml:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ecommszone_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      com.oqmi.service: "listmonk"
      com.oqmi.project: "eCommsZone"
      com.oqmi.managed-by: "PROGRAM_CONTROL/MKTP-WORK-004"

  # ---------------------------------------------------------------------------
  # PostgreSQL — persistent data store for listmonk
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: ecommszone_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommszone_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    labels:
      com.oqmi.service: "postgres"
      com.oqmi.project: "eCommsZone"
      com.oqmi.managed-by: "PROGRAM_CONTROL/MKTP-WORK-004"

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
    labels:
      com.oqmi.project: "eCommsZone"
  listmonk_uploads:
    driver: local
    labels:
      com.oqmi.project: "eCommsZone"

# =============================================================================
# Networks
# =============================================================================
networks:
  ecommszone_net:
    driver: bridge
    labels:
      com.oqmi.project: "eCommsZone"
