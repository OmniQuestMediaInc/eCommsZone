# =============================================================================
# listmonk configuration — eCommsZone
# Reference: https://listmonk.app/docs/configuration/
# Most secrets are injected via environment variables (see docker-compose.yml
# and .env.example). This file holds non-secret defaults.
# =============================================================================

[app]
# Bind on all interfaces inside the container; the published port is mapped
# in docker-compose.yml.
address = "0.0.0.0:9000"

# Public-facing URL (used for unsubscribe links, tracking pixels, webhooks).
# Override in production via the LISTMONK_app__root_url env var.
root_url = "https://comms.omniquestmedia.com"

# Default "from" identity for messages that do not specify one.
from_email = "OmniQuest Media <no-reply@omniquestmedia.com>"

# UI logo / favicon — override per environment if needed.
logo_url  = "https://comms.omniquestmedia.com/static/logo.png"
favicon_url = "https://comms.omniquestmedia.com/static/favicon.png"

# Notification recipients (ops alerts, bounce thresholds, etc.)
notify_emails = ["ops@omniquestmedia.com"]

# Concurrency tuning. Brevo's sustained throughput on the standard plan is
# generous; tune these per environment.
concurrency        = 10
message_rate       = 50           # messages per second per worker
batch_size         = 1000
max_send_errors    = 1000
sliding_window     = false

# Bounces / complaints: feed Brevo webhooks into listmonk for closed-loop
# suppression. See docs/SETUP.md.
enable_public_archive    = false
enable_public_subscription = false

# -----------------------------------------------------------------------------
# Database — overridden by LISTMONK_db__* env vars in docker-compose.yml.
# Values here are safe local defaults.
# -----------------------------------------------------------------------------
[db]
host     = "db"
port     = 5432
user     = "listmonk"
password = ""              # injected via env
database = "listmonk"
ssl_mode = "disable"
max_open = 25
max_idle = 25
max_lifetime = "300s"

# -----------------------------------------------------------------------------
# SMTP — Brevo relay. Credentials are injected from .env.
# All transactional + campaign mail flows through this single relay so that
# Brevo handles deliverability, suppressions, and analytics.
# -----------------------------------------------------------------------------
[[smtp]]
enabled        = true
host           = "smtp-relay.brevo.com"
port           = 587
auth_protocol  = "login"
username       = "$BREVO_SMTP_USER"
password       = "$BREVO_SMTP_PASSWORD"
hello_hostname = "comms.omniquestmedia.com"
max_conns      = 10
max_msg_retries = 2
idle_timeout   = "15s"
wait_timeout   = "5s"
tls_type       = "STARTTLS"
tls_skip_verify = false
email_headers  = [
  { header = "X-OQMI-Service", value = "eCommsZone" },
  { header = "X-OQMI-Tenant",  value = "OmniQuest" }
]

# -----------------------------------------------------------------------------
# Messengers — additional channels (e.g. Brevo SMS via webhook/HTTP).
# Configured at runtime through the listmonk admin UI.
# -----------------------------------------------------------------------------
[upload]
provider   = "filesystem"
filesystem.upload_path = "/listmonk/uploads"
filesystem.upload_uri  = "/uploads"
max_file_size = "10485760"   # 10 MB
extensions    = ["png", "jpg", "jpeg", "gif", "svg", "pdf"]

# -----------------------------------------------------------------------------
# Privacy / compliance
# -----------------------------------------------------------------------------
[privacy]
individual_tracking = false   # default off; enable per-campaign as needed
unsubscribe_header  = true    # List-Unsubscribe / one-click (RFC 8058)
allow_blocklist     = true
allow_export        = true
allow_wipe          = true
exportable          = ["profile", "subscriptions", "campaign_views", "link_clicks"]
domain_blocklist    = []
# listmonk — Default Configuration
# OmniQuest Media Inc. | PROGRAM_CONTROL: MKTP-WORK-004
# =============================================================================
# This file is mounted read-only into the listmonk container.
# Sensitive values (DB credentials, SMTP passwords) are injected via
# environment variables defined in docker-compose.yml / .env.
#
# Full reference: https://listmonk.app/docs/configuration/
# =============================================================================

[app]
  # Server listen address (container-internal; Docker maps to host port 9000)
  address = "0.0.0.0:9000"

  # Site name shown in the listmonk UI and outgoing email footers
  name = "eCommsZone — OmniQuest Media"

  # Root URL used for generating unsubscribe links, campaign reports, etc.
  # IMPORTANT: Update this to your production domain before sending any campaigns.
  root_url = "https://comms.yourdomain.ca"

  # Maximum number of records returned per API page
  max_sendqueue_size = 1000

  # Favicon and logo (relative to uploads dir or absolute URL)
  favicon_url = ""
  logo_url    = ""

  # Enable the default landing page (subscriber-facing)
  enable_public_subscription_page = true

  # Cache TTL for templates (seconds); reduce to 0 in development
  cache_slow_queries = false

  # Batch size for subscriber import
  batch_size = 1000

[privacy]
  # Individual data export / erasure (CASL/GDPR compliance)
  allow_blocklist  = true
  allow_export     = true
  allow_wipe       = true

  # Automatically wipe subscriber PII on unsubscribe
  exportable_fields = ["name", "email", "attributes"]

[security]
  # OIDC / OAuth (leave empty to use built-in user/password auth)
  oidc_provider_url      = ""
  oidc_client_id         = ""
  oidc_client_secret     = ""
  oidc_redirect_url      = ""

[db]
  # Connection values are overridden by LISTMONK_db__* environment variables
  # (set in docker-compose.yml). Values here serve as documentation only.
  host     = "db"
  port     = 5432
  user     = "listmonk"
  password = ""          # Injected via LISTMONK_db__password env var
  database = "listmonk"
  ssl_mode = "disable"
  max_open  = 25
  max_idle  = 25
  max_lifetime = "300s"

[smtp]
  # Brevo SMTP relay — primary outbound channel
  # Credentials are set via environment variables and injected through
  # listmonk's "Settings → SMTP" UI after first run, OR pre-seeded via
  # the listmonk provisioning API.
  #
  # Host:     smtp-relay.brevo.com
  # Port:     587
  # Auth:     LOGIN
  # TLS:      STARTTLS
  #
  # NOTE: listmonk stores SMTP settings in the database (not this file).
  # The values here are for documentation and initial setup reference only.

[upload]
  # Storage backend for campaign media uploads
  provider = "filesystem"

  [upload.filesystem]
    upload_path = "/listmonk/uploads"
    upload_uri  = "/uploads"

  [upload.s3]
    # Uncomment and configure to use S3-compatible object storage
    # aws_access_key_id     = ""
    # aws_secret_access_key = ""
    # aws_default_region    = "ca-central-1"
    # bucket                = ""
    # bucket_domain         = ""
    # bucket_path           = "/"
    # public_url            = ""

[messengers]
  # listmonk supports custom messenger plugins for SMS, Slack, etc.
  # Brevo SMS is handled via the eCommsZone TypeScript client directly
  # (see integrations/nodejs/src/ecommszone-client.ts).

[bounce]
  # Bounce handling — poll mailbox for bounce notifications
  enabled = false
  # Uncomment and configure IMAP settings to enable bounce processing
  # [bounce.mailboxes]
  #   [[bounce.mailboxes.mailbox]]
  #     host     = "imap.yourdomain.ca"
  #     port     = 993
  #     auth_protocol = "userpass"
  #     username = "bounces@yourdomain.ca"
  #     password = ""
  #     tls_enabled      = true
  #     tls_skip_verify  = false
  #     scan_interval    = "15m"

[log]
  level = "info"   # Options: debug | info | warn | error
