# eCommsZone — Nginx virtual host
# Reverse-proxy to API gateway (port 4000) and listmonk (port 9000, internal only)

upstream ecommszone_api {
    server api:4000;
    keepalive 32;
}

upstream ecommszone_listmonk {
    server listmonk:9000;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.ecommszone.internal ecommszone.internal;
    return 301 https://$host$request_uri;
}

# ── HTTPS — Public API gateway ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.ecommszone.internal;

    ssl_certificate     /etc/letsencrypt/live/api.ecommszone.internal/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ecommszone.internal/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 10m;

    location / {
        proxy_pass http://ecommszone_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }
}

# ── HTTPS — listmonk admin (internal network only) ───────────────────────────
server {
    listen 443 ssl http2;
    server_name listmonk.ecommszone.internal;

    ssl_certificate     /etc/letsencrypt/live/listmonk.ecommszone.internal/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/listmonk.ecommszone.internal/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Restrict access to internal network
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;

    location / {
        proxy_pass http://ecommszone_listmonk;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
