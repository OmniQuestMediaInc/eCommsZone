<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ subject }}</title>
  <style>
    body { margin: 0; padding: 0; background: #f4f4f4; font-family: Arial, sans-serif; }
    .wrapper { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 6px; overflow: hidden; }
    .header { background: #1a1a2e; padding: 32px 40px; text-align: center; }
    .header img { height: 40px; }
    .body { padding: 40px; color: #333333; line-height: 1.6; }
    .body h1 { font-size: 24px; margin-top: 0; }
    .cta { display: inline-block; margin: 24px 0; padding: 14px 28px; background: #e94560; color: #ffffff; text-decoration: none; border-radius: 4px; font-weight: bold; }
    .footer { background: #f4f4f4; padding: 24px 40px; font-size: 12px; color: #888888; text-align: center; }
    .footer a { color: #888888; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <!-- Replace with tenant logo -->
      <span style="color:#ffffff;font-size:22px;font-weight:bold;">{{ tenant_name }}</span>
    </div>
    <div class="body">
      <h1>{{ headline }}</h1>
      <p>Hi {{ first_name }},</p>
      {{ body_content }}
      <a href="{{ cta_url }}" class="cta">{{ cta_label }}</a>
      <p style="font-size:13px;color:#666;">If you did not request this email, you can safely ignore it.</p>
    </div>
    <div class="footer">
      <p>© {{ year }} {{ tenant_name }}. All rights reserved.</p>
      <p>
        <a href="{{ unsubscribe_url }}">Unsubscribe</a> ·
        <a href="{{ privacy_url }}">Privacy Policy</a>
      </p>
      <p>{{ company_address }}</p>
    </div>
  </div>
</body>
</html>
